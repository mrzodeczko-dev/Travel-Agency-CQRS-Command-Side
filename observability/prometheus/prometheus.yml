global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'travel-agency-command-side'
    metrics_path: '/actuator/prometheus'
    scrape_interval: 5s
    static_configs:
      - targets: ['travel-agency-command-side:8080']
        labels:
          application: 'travel-agency-command-side'
