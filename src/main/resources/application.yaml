server:
  port: ${SERVER_PORT:8080}`

spring:
  application:
    name: ${SPRING_APPLICATION_NAME:travel-agency-command-side}

  threads:
    virtual:
      enabled: true

  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    hikari:
      maximum-pool-size: 20
      connection-timeout: 2000
      keepalive-time: 30000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          batch_size: 50
          order_inserts: true
          order_updates: true
    open-in-view: false

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.xml

  kafka:
    bootstrap-servers: kafka:9092
    properties:
      schema.registry.url: http://schema-registry:8200

kafka:
  topics:
    bookings:
      name: ${TOPIC_BOOKINGS:travel.bookings}
    hotels:
      name: ${TOPIC_HOTELS:travel.hotels}
  outbox:
    poll-interval: 1000
    batch-size: 50
    max-retries: 5

springdoc:
  api-docs:
    enabled: ${SPRINGDOC_ENABLED:false}
  swagger-ui:
    enabled: ${SPRINGDOC_ENABLED:false}

management:
  endpoints:
    web:
      exposure:
        include: "health,prometheus,info"
  endpoint:
    health:
      show-details: when_authorized
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        http.server.requests: true
  opentelemetry:
    tracing:
      enabled: ${TRACING_ENABLED:false}
      sampling:
        probability: ${TRACING_SAMPLING:1.0}
      export:
        otlp:
          endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://tempo:4318}
    metrics:
      export:
        otlp:
          enabled: false
    logs:
      export:
        otlp:
          enabled: false