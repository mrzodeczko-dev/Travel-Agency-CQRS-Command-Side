server:
  port: 0

spring:
  application:
    name: travel-agency-command-side-it

  threads:
    virtual:
      enabled: true

  datasource:
    # Overridden by @DynamicPropertySource from AbstractIntegrationTest
    url: placeholder
    username: placeholder
    password: placeholder
    hikari:
      maximum-pool-size: 10

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.xml

  kafka:
    bootstrap-servers: ${spring.embedded.kafka.brokers}
    properties:
      schema.registry.url: mock://test-registry

kafka:
  topics:
    bookings:
      name: travel.bookings.test
    hotels:
      name: travel.hotels.test
  outbox:
    poll-interval: 999999999
    batch-size: 50
    max-retries: 5

management:
  endpoints:
    web:
      exposure:
        include: health
  opentelemetry:
    tracing:
      enabled: false
    metrics:
      export:
        otlp:
          enabled: false
    logs:
      export:
        otlp:
          enabled: false

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false
