services:
  
  # ---------------------------------------------------------------------------------------------------------------------------------------------------------------
  # DATABASES
  # ---------------------------------------------------------------------------------------------------------------------------------------------------------------

  travel-agency-command-side-postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    volumes:
      - travel-agency-command-side-postgres:/var/lib/postgresql
    environment:
      POSTGRES_DB: ${TA_COMMAND_SIDE_SERVICE_DB_NAME}
      POSTGRES_USER: ${TA_COMMAND_SIDE_SERVICE_DB_USER}
      POSTGRES_PASSWORD: ${TA_COMMAND_SIDE_SERVICE_DB_PASSWORD}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
      TZ: UTC
    command:
      - "postgres"
      - "-c"
      - "timezone=UTC"
    ports:
      - '${TA_COMMAND_SIDE_SERVICE_DB_PORT}:5432'
    expose:
      - '${TA_COMMAND_SIDE_SERVICE_DB_PORT}'
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${TA_COMMAND_SIDE_SERVICE_DB_USER} -d ${TA_COMMAND_SIDE_SERVICE_DB_NAME}" ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
    networks:
      - mr-network
  
  # ---------------------------------------------------------------------------------------------------------------------------------------------------------------
  # KAFKA
  # ---------------------------------------------------------------------------------------------------------------------------------------------------------------

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka-single
    hostname: kafka
    ports:
      - "9092:9092"
      - "9093:9093"
    env_file:
      - .env
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "bash", "-c", "kafka-topics --bootstrap-server localhost:9092 --list"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - mr-network

  schema-registry:
    image: confluentinc/cp-schema-registry:7.6.0
    container_name: schema-registry
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8200:8200"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8200
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: kafka:9092
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8200/subjects" ]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - mr-network

  kafka-init:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: [ "bash", "-c", "
      echo 'Creating Kafka topics...' &&
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic ${TOPIC_BOOKINGS} --partitions ${TOPIC_PARTITIONS:-3} --replication-factor ${TOPIC_REPLICAS:-1} &&
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic ${TOPIC_HOTELS} --partitions ${TOPIC_PARTITIONS:-3} --replication-factor ${TOPIC_REPLICAS:-1} --config cleanup.policy=compact &&
      echo 'All topics created successfully'
      " ]
    restart: "no"
    networks:
      - mr-network

  kafka-ui:
    image: provectuslabs/kafka-ui:0.3.3
    container_name: kafka-ui
    ports:
      - "8100:8080"
    environment:
      - KAFKA_CLUSTERS_0_NAME=kraft-cluster
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=kafka:9092
      - KAFKA_CLUSTERS_0_KAFKACONNECT_ENABLED=false
      - KAFKA_CLUSTERS_0_SCHEMAREGISTRY=http://schema-registry:8200
    depends_on:
      kafka:
        condition: service_healthy
      schema-registry:
        condition: service_healthy
    networks:
      - mr-network
  
  # ---------------------------------------------------------------------------------------------------------------------------------------------------------------
  # APPLICATIONS
  # ---------------------------------------------------------------------------------------------------------------------------------------------------------------        

  travel-agency-command-side:
    build:
      context: .
      dockerfile: Dockerfile
    restart: on-failure:10
    ports:
      - "${TA_COMMAND_SIDE_SERVICE_PORT}:8080"
    depends_on:
      travel-agency-command-side-postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      schema-registry:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    environment:
      SPRING_APPLICATION_NAME: ${TA_COMMAND_SIDE_SERVICE_APPLICATION_NAME}
      SPRING_DATASOURCE_URL: jdbc:postgresql://travel-agency-command-side-postgres:5432/${TA_COMMAND_SIDE_SERVICE_DB_NAME}?useUnicode=true&useJDBCCompliantTimezoneShift=true&useLegacyDatetimeCode=false&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: ${TA_COMMAND_SIDE_SERVICE_DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${TA_COMMAND_SIDE_SERVICE_DB_PASSWORD}
      SERVER_PORT: ${TA_COMMAND_SIDE_SERVICE_PORT}
      TOPIC_BOOKINGS: ${TOPIC_BOOKINGS}
      TOPIC_HOTELS: ${TOPIC_HOTELS}
      SPRINGDOC_ENABLED: ${SPRINGDOC_ENABLED}
      TRACING_ENABLED: ${TRACING_ENABLED:-false}
      TRACING_SAMPLING: ${TRACING_SAMPLING:-1.0}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://tempo:4318
    deploy:
        resources:
            limits:
              cpus: '1.0'
              memory: 768M
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
    networks:
      - mr-network


  # ---------------------------------------------------------------------------------------------------------------------------------------------------------------
  # OBSERVABILITY
  # ---------------------------------------------------------------------------------------------------------------------------------------------------------------

  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: prometheus
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=7d'
    depends_on:
      travel-agency-command-side:
        condition: service_started
    networks:
      - mr-network

  tempo:
    image: grafana/tempo:2.5.0
    container_name: tempo
    volumes:
      - ./observability/tempo/tempo.yml:/etc/tempo/tempo.yml:ro
      - tempo-data:/var/tempo
    ports:
      - "3200:3200"
      - "4317:4317"
      - "4318:4318"
    command: [ "-config.file=/etc/tempo/tempo.yml" ]
    networks:
      - mr-network

  grafana:
    image: grafana/grafana:11.1.0
    container_name: grafana
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    depends_on:
      - prometheus
      - tempo
    networks:
      - mr-network

volumes:
  travel-agency-command-side-postgres:
  kafka-data:
  prometheus-data:
  tempo-data:
  grafana-data:

networks:
  mr-network: